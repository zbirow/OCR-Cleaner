<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Manga Cleaner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .sidebar { height: 100vh; position: fixed; right: 0; top: 0; width: 420px; background: #151515; border-left: 1px solid #333; padding: 20px; display: flex; flex-direction: column; z-index: 1000; }
        .main-content { margin-right: 420px; padding: 20px; text-align: center; }
        .img-wrapper { position: relative; display: inline-block; margin-bottom: 60px; border: 1px solid #333; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: crosshair; }
        .img-wrapper img { display: block; max-width: 100%; height: auto; user-select: none; }
        
        .bubble-rect { position: absolute; border: 2px solid transparent; cursor: pointer; z-index: 10; box-sizing: border-box; }
        .bubble-rect.active-target { box-shadow: 0 0 25px rgba(0,255,0,0.6); }
        .resizer { width: 12px; height: 12px; background: #00ff00; position: absolute; right: -6px; bottom: -6px; cursor: nwse-resize; border: 1px solid black; border-radius: 2px; z-index: 20; }
        
        #bubbleList { flex-grow: 1; overflow-y: auto; background: #0c0c0c; border-radius: 8px; border: 1px solid #333; height: 500px; }
        .bubble-item { padding: 10px; border-bottom: 1px solid #222; font-size: 0.85rem; cursor: pointer; transition: 0.2s; color: #e0e0e0; }
        .bubble-item.updating { background: #333300 !important; border-left: 4px solid #ffff00; }

        .small.text-muted, .text-muted.small, label.small.text-muted, span.small.text-muted, .form-text.text-muted.small, .text-muted { color: #ffffff !important; opacity: 1 !important; font-weight: 500 !important; text-shadow: 0 0 1px rgba(0,0,0,0.3); }
        .bg-dark .small.text-muted, .card.bg-dark .small.text-muted, .sidebar .small.text-muted { color: #ffffff !important; text-shadow: 0 0 2px rgba(0,0,0,0.5); }
        
        /* Menu Kontekstowe */
        #contextMenu { position: fixed; display: none; background: #1e1e2a; border: 1px solid #4f46e5; box-shadow: 5px 5px 25px rgba(0,0,0,0.6); z-index: 10000; width: 310px; padding-bottom: 8px; border-radius: 12px; backdrop-filter: blur(4px); overflow: hidden; }
        #menuHeader { background: #4f46e5; color: white; padding: 8px 15px; font-weight: bold; cursor: move; font-size: 0.85rem; margin-bottom: 8px; user-select: none; display: flex; justify-content: space-between; }
        .menu-item { padding: 6px 18px; cursor: pointer; font-size: 0.9rem; color: #eee; transition: 0.15s; }
        .menu-item:hover { background: #3a32aa; }
        .menu-sep { height: 1px; background: #333; margin: 6px 0; }
        
        /* Panel kolorów */
        .color-panel { padding: 12px 18px; background: #252530; border-radius: 10px; margin: 5px 10px 8px 10px; }
        .color-panel label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #ccc; margin-bottom: 4px; display: inline-block; cursor: pointer;}
        .color-preview { width: 45px; height: 45px; border-radius: 10px; border: 2px solid #fff; margin: 5px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: 0.1s; }
        .color-slider-container { flex: 1; }
        .color-hex-input { background: #1a1a2a; border: 1px solid #4f46e5; color: white; border-radius: 6px; padding: 5px 8px; font-family: monospace; font-size: 0.85rem; width: 85px; text-align: center; }
        .color-hex-input:focus { outline: none; border-color: #6c63ff; }
        
        .btn-apply-color { background: #2c7a4d; color: white; padding: 6px; border: none; border-radius: 6px; font-size: 0.75rem; font-weight: bold; transition: 0.1s; }
        .btn-apply-color:hover { background: #1f5e3a; }
        .btn-eyedropper { background: #4f46e5; color: white; margin-top: 8px; width: 100%; padding: 6px; border: none; border-radius: 6px; font-size: 0.75rem; font-weight: bold; transition: 0.1s; }
        .btn-eyedropper:hover { background: #6c63ff; }
        
        .rgb-slider-group { margin-bottom: 6px; }
        .rgb-slider-group span { font-size: 0.7rem; width: 25px; display: inline-block; }
        .rgb-slider { width: 140px; height: 4px; -webkit-appearance: none; background: #333; border-radius: 3px; }
        .rgb-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .slider-red::-webkit-slider-thumb { background: #ff4444; }
        .slider-green::-webkit-slider-thumb { background: #44ff44; }
        .slider-blue::-webkit-slider-thumb { background: #4444ff; }

        /* Narzędzie rysowania wektorów */
        #vectorDrawingUI { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ff3333; color: white; padding: 15px 25px; border-radius: 30px; z-index: 10001; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.8); display: none; align-items: center; gap: 15px; border: 2px solid white; }
        .drawing-svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
        .eyedropper-cursor { cursor: crosshair !important; }

        .overlay-loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(6px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .overlay-card { background: #1e1e2e; border-radius: 24px; padding: 35px 45px; min-width: 340px; text-align: center; box-shadow: 0 30px 50px rgba(0,0,0,0.7); border: 1px solid #4f46e5; }
        .spinner-border-custom { width: 3.5rem; height: 3.5rem; border-width: 0.3rem; color: #4f46e5; }
        .overlay-card p { margin-top: 20px; font-size: 1.2rem; font-weight: 500; color: #eee; }
        .btn-ok-modal { background: #4f46e5; border: none; padding: 8px 32px; margin-top: 20px; font-weight: bold; border-radius: 40px; transition: 0.2s; color: white; }
        
        .form-control, .form-select { background-color: #2c2c2c; color: #ffffff; border-color: #444; }
        .form-check-label { color: #e0e0e0; }
    </style>
</head>
<body>

<div id="vectorDrawingUI">
    <span>🖊️ Tryb rysowania wektora (Klikaj na obrazku)</span>
    <button class="btn btn-light btn-sm fw-bold" onclick="finishVectorDrawing()">✔ Zakończ rysowanie</button>
    <button class="btn btn-dark btn-sm fw-bold" onclick="cancelVectorDrawing()">❌ Anuluj</button>
</div>

<div id="contextMenu">
    <div id="menuHeader">🛠️ Opcje Dymka <span onclick="hideMenu()" style="cursor:pointer">✖</span></div>
    <div class="menu-item" onclick="addBubble('rect'); event.stopPropagation();">🟩 Add Rectangle</div>
    <div class="menu-item" onclick="addBubble('circle'); event.stopPropagation();">⚪ Add Circle</div>
    <div class="menu-item" onclick="addBubble('triangle'); event.stopPropagation();">🔺 Add Triangle</div>
    <div class="menu-item text-warning fw-bold" onclick="startVectorDrawing(); event.stopPropagation();">🖊️ Draw Custom Polygon</div>
    <div id="menuRemove" class="menu-item text-danger fw-bold mt-1 border-top border-secondary pt-2" onclick="removeBubble(); event.stopPropagation();">❌ Remove Selected Shape</div>
    
    <div class="color-panel mt-2" onclick="event.stopPropagation()">
        <!-- KONTROLA OBROTU -->
        <div class="d-flex justify-content-between small text-white fw-bold mb-1"><span>🔄 Obrót kształtu</span><span id="lblShapeAngle">0°</span></div>
        <input type="range" id="shapeAngle" min="0" max="360" value="0" class="form-range mb-3" style="height:5px;" oninput="updateShapeAngle()">
        
        <div class="menu-sep mb-3"></div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="m-0">🎨 WYPEŁNIENIE</label>
            <div class="form-check form-switch m-0">
                <input class="form-check-input" type="checkbox" id="fullPreviewToggle" onchange="toggleFullPreview()">
                <label class="form-check-label text-white small fw-bold" style="font-size: 0.7rem; margin-top: 2px;" for="fullPreviewToggle">Pełny podgląd</label>
            </div>
        </div>
        
        <div class="d-flex gap-3 mb-2 small text-white">
            <label><input type="radio" name="fillType" value="solid" onchange="updateFillType()" checked> Jednolity</label>
            <label><input type="radio" name="fillType" value="gradient" onchange="updateFillType()"> Gradient</label>
        </div>
        
        <div id="gradControls" style="display:none; background: #1a1a2a; padding: 10px; border-radius: 8px; margin-bottom: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);">
            <div class="d-flex gap-3 mb-2 small text-info fw-bold">
                <label><input type="radio" name="colorTarget" value="c1" checked onchange="switchColorTarget()"> Kolor 1</label>
                <label><input type="radio" name="colorTarget" value="c2" onchange="switchColorTarget()"> Kolor 2</label>
            </div>
            <div class="d-flex justify-content-between small text-white mt-2"><span>Kąt</span><span id="lblAngle">180°</span></div>
            <input type="range" id="gradAngle" min="0" max="360" value="180" class="form-range" style="height:5px;" oninput="updateGradientLive()">
            <div class="d-flex justify-content-between small text-white mt-1"><span>Start</span><span id="lblStop1">0%</span></div>
            <input type="range" id="gradStop1" min="0" max="100" value="0" class="form-range" style="height:5px;" oninput="updateGradientLive()">
            <div class="d-flex justify-content-between small text-white mt-1"><span>Koniec</span><span id="lblStop2">100%</span></div>
            <input type="range" id="gradStop2" min="0" max="100" value="100" class="form-range" style="height:5px;" oninput="updateGradientLive()">
        </div>

        <div class="d-flex align-items-center gap-3 mb-2 mt-2">
            <div id="colorPreviewBox" class="color-preview" style="background-color: #ffffff;"></div>
            <div class="color-slider-container">
                <div class="rgb-slider-group d-flex align-items-center gap-2">
                    <span style="color:#ff8888">R</span><input type="range" id="redSlider" class="rgb-slider slider-red" min="0" max="255" value="255">
                </div>
                <div class="rgb-slider-group d-flex align-items-center gap-2">
                    <span style="color:#88ff88">G</span><input type="range" id="greenSlider" class="rgb-slider slider-green" min="0" max="255" value="255">
                </div>
                <div class="rgb-slider-group d-flex align-items-center gap-2">
                    <span style="color:#8888ff">B</span><input type="range" id="blueSlider" class="rgb-slider slider-blue" min="0" max="255" value="255">
                </div>
            </div>
        </div>
        
        <div class="d-flex justify-content-between align-items-center gap-2">
            <input type="text" id="hexInput" class="color-hex-input" value="#ffffff" maxlength="7">
            <button class="btn-apply-color w-100" onclick="hideMenu();">✓ Gotowe</button>
        </div>
        <button class="btn-eyedropper" onclick="activateEyedropper();">🎨 Pobierz kolor z obrazka</button>
    </div>
</div>

<div class="sidebar">
    <h3 class="mb-4 text-primary fw-bold">Manga Cleaner</h3>
    <div class="card p-3 bg-dark border-secondary mb-3">
        <input type="file" id="fileInput" class="form-control form-control-sm mb-2" multiple>
        <select id="langInput" class="form-select form-select-sm mb-2">
            <option>English</option><option>Korean</option><option>Japanese</option><option>Russian</option>
        </select>
        <label class="small text-muted">Confidence: <b id="confVal">0.40</b></label>
        <input type="range" id="confInput" class="form-range mb-3" min="0" max="1" step="0.05" value="0.4" oninput="document.getElementById('confVal').innerText=this.value">
        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="uploadImages()">SCAN OCR</button>
    </div>

    <div id="editor-ui" class="d-none d-flex flex-column flex-grow-1">
        <div class="card p-3 bg-dark border-secondary mb-3">
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="transToggle">
                <label class="form-check-label fw-bold small">Translate Layer</label>
            </div>
            <select id="targetLang" class="form-select form-select-sm mb-2">
                <option value="pl">Polish (Polski)</option><option value="en">English</option>
            </select>
            <select id="exportType" class="form-select form-select-sm mb-3">
                <option value="none">Only PNG</option>
                <option value="ora">Krita/GIMP (.ora)</option>
                <option value="psd">Photoshop (.psd)</option>
            </select>
            <button class="btn btn-success w-100 fw-bold py-2" onclick="saveAll()">💾 SAVE ALL</button>
        </div>
        <div id="bubbleList"></div>
    </div>
</div>

<div class="main-content"><div id="imageContainer"></div></div>

<script>
    let sessionData = [];
    let ocrTimer = null;
    let menuContext = { imgIdx: -1, bIdx: -1, x: 0, y: 0 };
    let eyedropperActive = false;
    
    let vectorMode = false;
    let vectorPoints = [];
    let currentVectorImgIdx = -1;
    let vectorSvg = null;

    // --- PRZECIĄGANIE MENU ---
    dragElement(document.getElementById("contextMenu"));
    function dragElement(elmnt) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const header = document.getElementById("menuHeader");
        header.onmousedown = dragMouseDown;
        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
            pos3 = e.clientX; pos4 = e.clientY;
            elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
            elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
        }
        function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
    }

    // --- RYSOWANIE WEKTORÓW ---
    function startVectorDrawing() {
        hideMenu();
        vectorMode = true; vectorPoints = []; currentVectorImgIdx = menuContext.imgIdx;
        document.getElementById('vectorDrawingUI').style.display = 'flex';
        const wrappers = document.querySelectorAll('.img-wrapper');
        const wrapper = wrappers[currentVectorImgIdx];
        vectorSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        vectorSvg.setAttribute("class", "drawing-svg-overlay");
        wrapper.appendChild(vectorSvg);
    }
    function cancelVectorDrawing() {
        vectorMode = false; document.getElementById('vectorDrawingUI').style.display = 'none';
        if (vectorSvg) vectorSvg.remove();
    }
    function finishVectorDrawing() {
        if (vectorPoints.length < 3) { alert("Wektor musi mieć min. 3 punkty!"); return; }
        
        let minX = Math.min(...vectorPoints.map(p => p.x)); let maxX = Math.max(...vectorPoints.map(p => p.x));
        let minY = Math.min(...vectorPoints.map(p => p.y)); let maxY = Math.max(...vectorPoints.map(p => p.y));
        let w = maxX - minX; let h = maxY - minY;
        if (w < 5) w = 5; if (h < 5) h = 5;
        
        let pctPoints = vectorPoints.map(p => ({ x: ((p.x - minX) / w) * 100, y: ((p.y - minY) / h) * 100 }));

        const id = Math.random().toString(36).substr(2, 8);
        sessionData[currentVectorImgIdx].bubbles.push({
            id: id, text: "", x: minX, y: minY, w: w, h: h, 
            selected: true, shape: 'polygon', points: pctPoints, angle: 0,
            fillType: "solid", color: "#ffffff", color2: "#000000",
            gradAngle: 180, gradStop1: 0, gradStop2: 100
        });

        cancelVectorDrawing(); renderImages();
    }

    document.addEventListener('click', function(e) {
        if (!vectorMode) return;
        const img = e.target.closest('img'); if (!img || !img.closest('.img-wrapper')) return;
        const wrapper = img.closest('.img-wrapper');
        const imgIdx = Array.from(document.querySelectorAll('.img-wrapper')).indexOf(wrapper);
        if (imgIdx !== currentVectorImgIdx) return; 

        // Wyliczenia współrzędnych czysto z poziomu Obrazu (img)
        const imgRect = img.getBoundingClientRect(); 
        const scale = img.clientWidth / sessionData[imgIdx].width;
        
        // rawX, rawY to idealna pozycja względem obrazka (bez marginesów wrapper'a!)
        const rawX = (e.clientX - imgRect.left); 
        const rawY = (e.clientY - imgRect.top);
        
        const realX = rawX / scale; 
        const realY = rawY / scale; 

        vectorPoints.push({x: realX, y: realY});

        // SVG jest nakładane na .img-wrapper. Aby koordynaty z img pasowały do SVG w wrapperze, 
        // musimy dodać offset samego obrazka (img.offsetTop / offsetLeft) względem jego wrappera
        const imgOffsetTop = img.offsetTop;
        const imgOffsetLeft = img.offsetLeft;

        let polyline = vectorSvg.querySelector('polyline');
        if (!polyline) {
            polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            polyline.setAttribute("fill", "none"); polyline.setAttribute("stroke", "#ff3333"); polyline.setAttribute("stroke-width", "3");
            vectorSvg.appendChild(polyline);
        }
        
        const pointsStr = vectorPoints.map(p => `${(p.x * scale) + imgOffsetLeft},${(p.y * scale) + imgOffsetTop}`).join(" ");
        polyline.setAttribute("points", pointsStr);
        
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", (realX * scale) + imgOffsetLeft); 
        circle.setAttribute("cy", (realY * scale) + imgOffsetTop); 
        circle.setAttribute("r", "5"); circle.setAttribute("fill", "#00ff00");
        vectorSvg.appendChild(circle);
    });

    // --- KSZTAŁTY I ROTACJA ---
    function updateShapeAngle() {
        if (menuContext.bIdx === -1) return;
        const b = sessionData[menuContext.imgIdx].bubbles.find(x => x.id == menuContext.bIdx);
        b.angle = document.getElementById('shapeAngle').value;
        document.getElementById('lblShapeAngle').innerText = b.angle + "°";
        applyRectBackground(b);
    }

    function addBubble(shape) {
        const id = Math.random().toString(36).substr(2, 8);
        sessionData[menuContext.imgIdx].bubbles.push({
            id: id, text: "", x: menuContext.x - 50, y: menuContext.y - 25, 
            w: 100, h: shape === 'triangle' ? 100 : 50, 
            selected: true, shape: shape, angle: 0,
            fillType: "solid", color: "#ffffff", color2: "#000000",
            gradAngle: 180, gradStop1: 0, gradStop2: 100
        });
        renderImages();
        triggerDelayedOCR(menuContext.imgIdx, sessionData[menuContext.imgIdx].bubbles.length - 1);
        hideMenu();
    }

    // --- STYLE, TŁA I ZIELONE RAMKI WEKTORÓW ---
    function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1); }
    function hexToRgb(hex) { let r = parseInt(hex.slice(1,3), 16); let g = parseInt(hex.slice(3,5), 16); let b = parseInt(hex.slice(5,7), 16); return { r, g, b }; }

    function toggleFullPreview() {
        if (!sessionData || sessionData.length === 0) return;
        sessionData.forEach(img => { img.bubbles.forEach(b => applyRectBackground(b)); });
    }

    function applyRectBackground(b, rectEl) {
        if (!rectEl) rectEl = document.getElementById(`rect-${b.id}`);
        if (!rectEl) return;
        
        const bgLayer = rectEl.querySelector('.bg-layer');
        const svgLayer = rectEl.querySelector('.stroke-layer');
        const polygon = svgLayer.querySelector('polygon');

        const fill = b.fillType || 'solid';
        const isFull = document.getElementById('fullPreviewToggle').checked;
        const a = isFull ? "" : "AA"; 
        
        rectEl.style.transform = `rotate(${b.angle || 0}deg)`;

        if (fill === 'gradient') {
            const c1 = (b.color || "#ffffff") + a; const c2 = (b.color2 || "#000000") + a;
            bgLayer.style.background = `linear-gradient(${b.gradAngle || 180}deg, ${c1} ${b.gradStop1 || 0}%, ${c2} ${b.gradStop2 || 100}%)`;
        } else { bgLayer.style.background = (b.color || "#ffffff") + a; }

        const activeColor = b.selected ? '#00ff00' : '#ff3333';
        if (b.shape === 'triangle') {
            bgLayer.style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";
            bgLayer.style.borderRadius = "0";
            rectEl.style.borderColor = "transparent";
            svgLayer.style.display = "block";
            polygon.setAttribute('points', "50,0 0,100 100,100");
            polygon.setAttribute('stroke', activeColor);
        } else if (b.shape === 'polygon' && b.points) {
            let path = b.points.map(p => `${p.x}% ${p.y}%`).join(', ');
            bgLayer.style.clipPath = `polygon(${path})`;
            bgLayer.style.borderRadius = "0";
            rectEl.style.borderColor = "transparent";
            svgLayer.style.display = "block";
            polygon.setAttribute('points', b.points.map(p => `${p.x},${p.y}`).join(' '));
            polygon.setAttribute('stroke', activeColor);
        } else if (b.shape === 'circle') {
            bgLayer.style.clipPath = "none"; bgLayer.style.borderRadius = "50%";
            rectEl.style.borderRadius = "50%"; rectEl.style.borderColor = activeColor;
            svgLayer.style.display = "none";
        } else {
            bgLayer.style.clipPath = "none"; bgLayer.style.borderRadius = "0";
            rectEl.style.borderRadius = "0"; rectEl.style.borderColor = activeColor;
            svgLayer.style.display = "none";
        }
    }

    const redSlider = document.getElementById('redSlider'); const greenSlider = document.getElementById('greenSlider');
    const blueSlider = document.getElementById('blueSlider'); const hexInput = document.getElementById('hexInput');
    const colorPreviewBox = document.getElementById('colorPreviewBox');

    function updateColorFromSliders() {
        const hex = rgbToHex(parseInt(redSlider.value), parseInt(greenSlider.value), parseInt(blueSlider.value));
        hexInput.value = hex.toUpperCase(); colorPreviewBox.style.backgroundColor = hex; saveActiveColorLive(hex);
    }
    function updateColorFromHex() {
        let hex = hexInput.value; if (!hex.startsWith('#')) hex = '#' + hex;
        if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
            const rgb = hexToRgb(hex); redSlider.value = rgb.r; greenSlider.value = rgb.g; blueSlider.value = rgb.b;
            colorPreviewBox.style.backgroundColor = hex; saveActiveColorLive(hex);
        }
    }
    function saveActiveColorLive(hex) {
        if (menuContext.bIdx === -1) return;
        const b = sessionData[menuContext.imgIdx].bubbles.find(x => x.id == menuContext.bIdx);
        const target = document.querySelector('input[name="colorTarget"]:checked').value;
        if (b.fillType === 'gradient' && target === 'c2') b.color2 = hex; else b.color = hex; 
        applyRectBackground(b);
    }
    
    redSlider.addEventListener('input', updateColorFromSliders); greenSlider.addEventListener('input', updateColorFromSliders);
    blueSlider.addEventListener('input', updateColorFromSliders); hexInput.addEventListener('input', updateColorFromHex);
    
    function setColorPickerValues(colorHex) {
        if (!colorHex) colorHex = "#ffffff";
        const rgb = hexToRgb(colorHex); redSlider.value = rgb.r; greenSlider.value = rgb.g; blueSlider.value = rgb.b;
        hexInput.value = colorHex.toUpperCase(); colorPreviewBox.style.backgroundColor = colorHex; saveActiveColorLive(colorHex); 
    }

    function updateFillType() {
        if (menuContext.bIdx === -1) return;
        const b = sessionData[menuContext.imgIdx].bubbles.find(x => x.id == menuContext.bIdx);
        b.fillType = document.querySelector('input[name="fillType"]:checked').value;
        const gc = document.getElementById('gradControls');
        if (b.fillType === 'gradient') { gc.style.display = 'block'; switchColorTarget(); } 
        else { gc.style.display = 'none'; setColorPickerValues(b.color); }
        applyRectBackground(b);
    }

    function switchColorTarget() {
        if (menuContext.bIdx === -1) return;
        const b = sessionData[menuContext.imgIdx].bubbles.find(x => x.id == menuContext.bIdx);
        const target = document.querySelector('input[name="colorTarget"]:checked').value;
        if (target === 'c1') setColorPickerValues(b.color || '#ffffff'); else setColorPickerValues(b.color2 || '#000000');
    }

    function updateGradientLive() {
        if (menuContext.bIdx === -1) return;
        const b = sessionData[menuContext.imgIdx].bubbles.find(x => x.id == menuContext.bIdx);
        b.gradAngle = document.getElementById('gradAngle').value; b.gradStop1 = document.getElementById('gradStop1').value; b.gradStop2 = document.getElementById('gradStop2').value;
        document.getElementById('lblAngle').innerText = b.gradAngle + "°"; document.getElementById('lblStop1').innerText = b.gradStop1 + "%"; document.getElementById('lblStop2').innerText = b.gradStop2 + "%";
        applyRectBackground(b);
    }

    function loadBubbleIntoMenu(b) {
        document.getElementById('shapeAngle').value = b.angle || 0; document.getElementById('lblShapeAngle').innerText = (b.angle || 0) + "°";
        const fill = b.fillType || 'solid';
        document.querySelector(`input[name="fillType"][value="${fill}"]`).checked = true; document.querySelector(`input[name="colorTarget"][value="c1"]`).checked = true;
        document.getElementById('gradAngle').value = b.gradAngle || 180; document.getElementById('gradStop1').value = b.gradStop1 || 0; document.getElementById('gradStop2').value = b.gradStop2 || 100;
        document.getElementById('lblAngle').innerText = (b.gradAngle || 180) + "°"; document.getElementById('lblStop1').innerText = (b.gradStop1 || 0) + "%"; document.getElementById('lblStop2').innerText = (b.gradStop2 || 100) + "%";
        document.getElementById('gradControls').style.display = fill === 'gradient' ? 'block' : 'none';
        setColorPickerValues(b.color);
    }

    function activateEyedropper() {
        if (eyedropperActive) return; eyedropperActive = true; document.body.classList.add('eyedropper-cursor');
        const handleImageClick = async (e) => {
            const img = e.target.closest('img'); if (!img || !img.closest('.img-wrapper')) return;
            e.preventDefault(); e.stopPropagation();
            const wrapper = img.closest('.img-wrapper');
            const imgIdx = Array.from(document.querySelectorAll('.img-wrapper')).indexOf(wrapper);
            const rect = img.getBoundingClientRect(); const scaleX = img.clientWidth / img.naturalWidth; const scaleY = img.clientHeight / img.naturalHeight;
            const clickX = (e.clientX - rect.left) / scaleX; const clickY = (e.clientY - rect.top) / scaleY;
            try {
                const canvas = document.createElement('canvas'); canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight);
                const pixel = ctx.getImageData(clickX, clickY, 1, 1).data;
                setColorPickerValues(rgbToHex(pixel[0], pixel[1], pixel[2]));
            } catch (err) {} finally { deactivateEyedropper(); }
        };
        const deactivateEyedropper = () => {
            eyedropperActive = false; document.body.classList.remove('eyedropper-cursor');
            document.removeEventListener('click', handleImageClick); document.removeEventListener('keydown', escHandler);
            const msg = document.getElementById('eyedropperMsg'); if (msg) msg.remove();
        };
        const escHandler = (e) => { if (e.key === 'Escape') deactivateEyedropper(); };
        document.addEventListener('click', handleImageClick); document.addEventListener('keydown', escHandler);
        
        const msg = document.createElement('div'); msg.id = 'eyedropperMsg'; msg.textContent = "🔍 Click on the image to pick a color (ESC to cancel)";
        msg.style.position = "fixed"; msg.style.bottom = "20px"; msg.style.left = "50%"; msg.style.transform = "translateX(-50%)"; msg.style.backgroundColor = "#4f46e5"; msg.style.color = "white"; msg.style.padding = "8px 16px"; msg.style.borderRadius = "40px"; msg.style.zIndex = "10001";
        document.body.appendChild(msg); setTimeout(() => { if (msg.parentNode) msg.remove(); }, 3000);
    }

    function hideMenu() { const menu = document.getElementById("contextMenu"); if (menu) menu.style.display = "none"; }

    window.addEventListener('contextmenu', function(e) {
        if (vectorMode) { e.preventDefault(); return; } 
        const wrapper = e.target.closest('.img-wrapper'); if (!wrapper) return;
        
        e.preventDefault(); e.stopPropagation();
        const menu = document.getElementById("contextMenu");
        const imgIdx = Array.from(document.querySelectorAll('.img-wrapper')).indexOf(wrapper);
        
        const imgEl = wrapper.querySelector('img'); 
        const imgRect = imgEl.getBoundingClientRect();
        const scale = imgEl.clientWidth / sessionData[imgIdx].width;
        
        // Zawsze liczymy z czystego zdjęcia
        menuContext = { imgIdx: imgIdx, x: (e.clientX - imgRect.left) / scale, y: (e.clientY - imgRect.top) / scale, bIdx: -1 };

        const bubble = e.target.closest('.bubble-rect');
        const removeBtn = document.getElementById("menuRemove");
        if (bubble) {
            menuContext.bIdx = bubble.id.split('-')[1]; removeBtn.style.display = "block";
            loadBubbleIntoMenu(sessionData[imgIdx].bubbles.find(b => b.id == menuContext.bIdx));
        } else {
            removeBtn.style.display = "none"; document.querySelector(`input[name="fillType"][value="solid"]`).checked = true;
            document.getElementById('gradControls').style.display = 'none'; setColorPickerValues("#ffffff");
            document.getElementById('shapeAngle').value = 0; document.getElementById('lblShapeAngle').innerText = "0°";
        }

        menu.style.display = "block"; 
        menu.style.left = Math.min(e.clientX, window.innerWidth - 330) + "px"; 
        menu.style.top = Math.min(e.clientY, window.innerHeight - 600) + "px";
    });

    document.addEventListener('click', function(e) {
        if (eyedropperActive || vectorMode) return;
        const menu = document.getElementById("contextMenu");
        if (menu && !menu.contains(e.target)) hideMenu();
    });

    function removeBubble() {
        const idx = sessionData[menuContext.imgIdx].bubbles.findIndex(b => b.id == menuContext.bIdx);
        if (idx !== -1) sessionData[menuContext.imgIdx].bubbles.splice(idx, 1);
        renderImages(); hideMenu();
    }

    async function uploadImages() {
        const files = document.getElementById('fileInput').files; if(!files.length) return;
        document.getElementById('imageContainer').innerHTML = "<h4>⏳ Processing OCR...</h4>";
        const formData = new FormData(); for(let f of files) formData.append('images', f);
        formData.append('language', document.getElementById('langInput').value); formData.append('confidence', document.getElementById('confInput').value);
        const resp = await fetch('/upload', { method: 'POST', body: formData }); sessionData = await resp.json();
        document.getElementById('editor-ui').classList.remove('d-none'); renderImages();
    }

    function renderImages() {
        const container = document.getElementById('imageContainer'); const list = document.getElementById('bubbleList'); container.innerHTML = ''; list.innerHTML = '';
        sessionData.forEach((img, imgIdx) => {
            const wrapper = document.createElement('div'); wrapper.className = 'img-wrapper'; wrapper.innerHTML = `<div class="p-1 bg-dark small text-start text-muted">${img.original_name}</div>`;
            const htmlImg = document.createElement('img'); htmlImg.src = `/static/input/${img.filename}`; wrapper.appendChild(htmlImg);
            htmlImg.onload = () => {
                const scale = htmlImg.clientWidth / img.width;
                const offsetTop = htmlImg.offsetTop; // Dynamiczny margines góry wyciągany po załadowaniu img

                img.bubbles.forEach((b, bIdx) => {
                    const rect = document.createElement('div'); rect.id = `rect-${b.id}`;
                    rect.className = `bubble-rect ${b.selected ? '' : 'deselected'}`;
                    
                    const bgLayer = document.createElement('div'); bgLayer.className = 'bg-layer';
                    bgLayer.style.cssText = 'position:absolute; width:100%; height:100%; top:0; left:0;';
                    rect.appendChild(bgLayer);
                    
                    const svgLayer = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    svgLayer.setAttribute('class', 'stroke-layer'); svgLayer.setAttribute('viewBox', '0 0 100 100'); svgLayer.setAttribute('preserveAspectRatio', 'none');
                    svgLayer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:11;';
                    const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    polygon.setAttribute('fill', 'none'); polygon.setAttribute('stroke-width', '2'); polygon.setAttribute('vector-effect', 'non-scaling-stroke');
                    svgLayer.appendChild(polygon); rect.appendChild(svgLayer);

                    applyRectBackground(b, rect);
                    updateRectStyle(rect, b, scale, offsetTop);
                    
                    rect.onclick = (e) => { if(e.target.className !== 'resizer') syncView(b.id, 'list'); e.stopPropagation(); };
                    setupEvents(rect, b, scale, offsetTop, imgIdx, bIdx); wrapper.appendChild(rect);
                    
                    const item = document.createElement('div'); item.className = 'bubble-item'; item.id = `item-${b.id}`;
                    item.onclick = (e) => { if(e.target.type !== 'checkbox') syncView(b.id, 'image'); e.stopPropagation(); };
                    item.innerHTML = `<input type="checkbox" class="form-check-input" ${b.selected ? 'checked' : ''} onchange="toggleB(${imgIdx}, ${bIdx}, '${b.id}')"><span class="ms-2 text-truncate" id="span-${b.id}">${b.text || '[puste]'}</span>`;
                    list.appendChild(item);
                });
            };
            container.appendChild(wrapper);
        });
    }

    function syncView(id, target) {
        const rect = document.getElementById(`rect-${id}`); const item = document.getElementById(`item-${id}`);
        document.querySelectorAll('.bubble-item').forEach(el => el.style.background="transparent"); document.querySelectorAll('.bubble-rect').forEach(el => el.classList.remove('active-target'));
        if (target === 'list') { item.scrollIntoView({ behavior: 'smooth', block: 'center' }); item.style.background = "#222200"; }
        else { rect.scrollIntoView({ behavior: 'smooth', block: 'center' }); rect.classList.add('active-target'); setTimeout(() => rect.classList.remove('active-target'), 2000); item.style.background = "#222200"; }
    }

    function updateRectStyle(el, b, scale, offsetTop) { 
        el.style.left = (b.x * scale) + 'px'; 
        el.style.top = (b.y * scale + offsetTop) + 'px'; 
        el.style.width = (b.w * scale) + 'px'; 
        el.style.height = (b.h * scale) + 'px'; 
    }

    function setupEvents(rect, b, scale, offsetTop, imgIdx, bIdx) {
        rect.onmousedown = (e) => {
            if(e.button !== 0 || e.target.className === 'resizer' || vectorMode) return;
            e.stopPropagation(); let sx = e.clientX, sy = e.clientY;
            document.onmousemove = (m) => { b.x += (m.clientX - sx)/scale; b.y += (m.clientY - sy)/scale; sx = m.clientX; sy = m.clientY; updateRectStyle(rect, b, scale, offsetTop); };
            document.onmouseup = () => { document.onmousemove = null; triggerDelayedOCR(imgIdx, bIdx); };
        };
        const resizer = document.createElement('div'); resizer.className = 'resizer';
        resizer.onmousedown = (e) => {
            if (vectorMode) return;
            e.stopPropagation(); let sx = e.clientX, sy = e.clientY;
            document.onmousemove = (m) => { b.w += (m.clientX - sx)/scale; b.h += (m.clientY - sy)/scale; sx = m.clientX; sy = m.clientY; updateRectStyle(rect, b, scale, offsetTop); };
            document.onmouseup = () => { document.onmousemove = null; triggerDelayedOCR(imgIdx, bIdx); };
        };
        rect.appendChild(resizer);
    }

    function triggerDelayedOCR(imgIdx, bIdx) {
        if (ocrTimer) clearTimeout(ocrTimer); const b = sessionData[imgIdx].bubbles[bIdx]; const listItem = document.getElementById(`item-${b.id}`);
        if(listItem) listItem.classList.add('updating');
        ocrTimer = setTimeout(async () => {
            const resp = await fetch('/re_ocr', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ filename: sessionData[imgIdx].filename, language: document.getElementById('langInput').value, x: b.x, y: b.y, w: b.w, h: b.h }) });
            const data = await resp.json(); b.text = data.text; document.getElementById(`span-${b.id}`).innerText = b.text || "[puste]";
            if(listItem) listItem.classList.remove('updating');
        }, 800);
    }

    function toggleB(imgIdx, bIdx, id) { 
        sessionData[imgIdx].bubbles[bIdx].selected = !sessionData[imgIdx].bubbles[bIdx].selected; 
        document.getElementById(`rect-${id}`).classList.toggle('deselected');
        applyRectBackground(sessionData[imgIdx].bubbles[bIdx]);
    }

    function showOverlayWithSpinner() {
        if (document.querySelector('.overlay-loading')) return;
        const overlay = document.createElement('div'); overlay.className = 'overlay-loading'; overlay.id = 'customOverlay';
        overlay.innerHTML = `<div class="overlay-card"><div class="spinner-border spinner-border-custom" role="status"></div><p>⏳ Processing save...<br>Please wait</p></div>`; document.body.appendChild(overlay);
    }
    function showMessageInOverlay(msg, isError = false) {
        const overlay = document.getElementById('customOverlay'); if (!overlay) return; const card = overlay.querySelector('.overlay-card');
        if (card) { card.innerHTML = `<div style="font-size: 3rem; margin-bottom: 10px;">${isError ? '⚠️' : '✅'}</div><p style="font-size: 1.2rem; font-weight: 500;">${msg}</p><button class="btn-ok-modal" id="closeOverlayBtn">OK</button>`; card.querySelector('#closeOverlayBtn').addEventListener('click', () => overlay.remove()); }
    }

    async function saveAll() {
        const type = document.getElementById('exportType').value;
        const dirResp = await fetch('/select_dir'); const dirData = await dirResp.json();
        if (!dirData.path) { showMessageInOverlay("❌ No target folder selected", true); return; }
        showOverlayWithSpinner();
        try {
            const resp = await fetch('/process', { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ image_data: sessionData, export_type: type, save_path: dirData.path, do_translate: document.getElementById('transToggle').checked, target_lang: document.getElementById('targetLang').value, ui_lang: document.getElementById('langInput').value }) 
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`); showMessageInOverlay("✅ Saved successfully!", false);
        } catch(err) { showMessageInOverlay(`❌ Save error: ${err.message}`, true); }
    }

    const exportTypeSelect = document.getElementById('exportType');
    exportTypeSelect.addEventListener('change', () => { const allowed = (exportTypeSelect.value === 'ora' || exportTypeSelect.value === 'psd'); document.getElementById('transToggle').disabled = !allowed; if(!allowed) document.getElementById('transToggle').checked = false; });
    window.onresize = () => renderImages();
</script>
</body>
